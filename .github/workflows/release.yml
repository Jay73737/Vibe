name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build all platforms
        run: |
          LDFLAGS="-X main.version=${{ github.ref_name }}"
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/vibe-windows-amd64.exe ./cmd/vibe/
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/vibe-linux-amd64     ./cmd/vibe/
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/vibe-linux-arm64     ./cmd/vibe/
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/vibe-darwin-amd64   ./cmd/vibe/
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/vibe-darwin-arm64   ./cmd/vibe/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
